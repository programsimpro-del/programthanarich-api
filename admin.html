<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#06C755">
<title>Program Thanarich — Admin</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
body{font-family:'Sarabun','Noto Sans Thai',sans-serif;background:#F0F2F5;min-height:100vh}
.app{max-width:480px;margin:0 auto;min-height:100vh;background:#F0F2F5;display:flex;flex-direction:column}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
.fade{animation:fadeUp .2s ease both}

/* ── TOPBAR ── */
.topbar{background:linear-gradient(135deg,#05A847,#06C755);padding:0 14px;display:flex;align-items:center;gap:10px;height:54px;flex-shrink:0;position:sticky;top:0;z-index:30;box-shadow:0 2px 12px rgba(0,0,0,.3)}

/* ── TAB BAR ── */
.tabbar{display:flex;background:#fff;border-bottom:2px solid #E8E8E8;flex-shrink:0;position:sticky;top:54px;z-index:20}
.tab{flex:1;padding:12px 0;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;font-size:12px;font-weight:700;color:#9E9E9E;position:relative}
.tab.active{color:#06C755;border-bottom-color:#06C755}
.tab-badge{position:absolute;top:6px;right:calc(50% - 20px);background:#EF5350;color:#fff;border-radius:20px;font-size:9px;font-weight:900;padding:1px 5px;min-width:16px;text-align:center}

/* ── SCREENS ── */
.screen{display:none;flex:1;flex-direction:column;overflow-y:auto}
.screen.on{display:flex}

/* ══════════════════════════════
   TAB 1 — LINE OA CHAT STYLE
══════════════════════════════ */
.chat-list-wrap{flex:1;overflow-y:auto;background:#fff}
.chat-search{padding:8px 12px;background:#fff;border-bottom:1px solid #F0F0F0;flex-shrink:0}
.chat-search input{width:100%;border:none;background:#F5F5F5;border-radius:20px;padding:8px 14px;font-size:13px;outline:none;font-family:inherit;color:#111}
.chat-item{display:flex;align-items:center;gap:11px;padding:12px 14px;border-bottom:1px solid #F5F5F5;cursor:pointer;background:#fff;transition:background .12s;position:relative}
.chat-item:active{background:#F5F5F5}
.chat-item.unread .chat-name{font-weight:800;color:#111}
.chat-item.unread .chat-preview{font-weight:600;color:#424242}
.chat-avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#06C755,#05A847);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;overflow:hidden;position:relative}
.chat-avatar img{width:100%;height:100%;object-fit:cover}
.online-dot{position:absolute;bottom:2px;right:2px;width:11px;height:11px;background:#06C755;border-radius:50%;border:2px solid #fff}
.chat-name{font-size:14px;font-weight:600;color:#212121;margin-bottom:2px}
.chat-preview{font-size:12px;color:#9E9E9E;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
.chat-time{font-size:11px;color:#BDBDBD;flex-shrink:0;align-self:flex-start;margin-top:3px}
.chat-unread-badge{background:#06C755;color:#fff;border-radius:50%;min-width:18px;height:18px;font-size:10px;font-weight:900;display:flex;align-items:center;justify-content:center;padding:0 3px;flex-shrink:0;align-self:flex-start;margin-top:2px}

/* ── CHAT DETAIL ── */
.chat-detail{display:flex;flex-direction:column;height:calc(100vh - 54px - 49px);background:#E8EDF2}
.chat-detail-hdr{background:#06C755;padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.msg-area{flex:1;overflow-y:auto;padding:10px;-webkit-overflow-scrolling:touch}
.bwrap{display:flex;margin-bottom:8px;animation:fadeUp .2s ease}
.bwrap.adm{justify-content:flex-end}
.bubble{padding:9px 12px;font-size:13px;line-height:1.55;max-width:74%;white-space:pre-wrap;word-break:break-word;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.bubble.cust{background:#fff;color:#111;border-radius:4px 16px 16px 16px}
.bubble.adm-b{background:#06C755;color:#fff;border-radius:16px 4px 16px 16px}
.btime{font-size:10px;color:#9E9E9E;margin-top:2px}
.ibar{background:#fff;border-top:1px solid #E0E0E0;padding:9px 11px;display:flex;gap:7px;align-items:flex-end;flex-shrink:0}
.ibar textarea{flex:1;border:1.5px solid #E0E0E0;border-radius:20px;padding:8px 13px;font-size:13px;resize:none;outline:none;font-family:inherit;max-height:80px;background:#F5F5F5;transition:border-color .2s}
.ibar textarea:focus{border-color:#06C755;background:#fff}
.ibtn{width:36px;height:36px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;transition:all .15s}
.ibtn:active{transform:scale(.93)}
.qpanel{background:#fff;border-top:1px solid #EEE;padding:8px 10px;max-height:170px;overflow-y:auto;flex-shrink:0}
.qbtn{display:block;width:100%;text-align:left;padding:8px 11px;border:none;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;margin-bottom:5px;font-family:inherit;background:#E8F5E9;color:#166534;transition:all .12s}
.qbtn:active{transform:scale(.98)}

/* ══════════════════════════════
   TAB 2 — NOTIFICATION / ORDER
══════════════════════════════ */
.notif-wrap{flex:1;overflow-y:auto}
.notif-hdr{background:#E3F2FD;padding:7px 13px;font-size:12px;color:#1565C0;font-weight:600;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.stats{display:flex;gap:8px;padding:12px;flex-shrink:0}
.stat{flex:1;border-radius:13px;padding:10px 6px;text-align:center;cursor:pointer;transition:all .2s}
.filter-row{display:flex;gap:6px;padding:0 12px 10px;flex-wrap:wrap;flex-shrink:0}
.fbtn{padding:5px 12px;border-radius:20px;border:none;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.ord-card{background:#fff;border-radius:15px;padding:12px 13px;border:1.5px solid #EEEEEE;cursor:pointer;box-shadow:0 1px 6px rgba(0,0,0,.04);transition:all .15s;margin:0 12px 8px}
.ord-card:active{box-shadow:0 4px 14px rgba(0,0,0,.09)}
.tag{display:inline-block;font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;white-space:nowrap}

/* ── ORDER DETAIL PANEL ── */
.ord-detail{display:flex;flex-direction:column;height:calc(100vh - 54px - 49px);overflow:hidden}
.ord-scroll{overflow-y:auto;flex-shrink:0;max-height:55vh}
.order-box{background:linear-gradient(135deg,#FF5722,#E64A19);border-radius:13px;padding:13px 14px;margin:10px 10px 0;color:#fff}
.copy-row{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.18);border:2px solid rgba(255,255,255,.4);border-radius:11px;padding:10px 12px;margin-bottom:8px}
.cbtn{flex-shrink:0;padding:8px 14px;border-radius:9px;border:none;background:#fff;color:#E65100;font-weight:900;font-size:12px;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .15s}
.cbtn:active{transform:scale(.96)}
.vstep{display:flex;align-items:flex-start;gap:9px;padding:7px 0;border-bottom:1px solid #F5F5F5}
.vstep:last-child{border:none}
.vicon{width:28px;height:28px;border-radius:50%;background:#FEF3C7;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}

/* ── PHOTOS / AI / NET MENU ── */
.pstrip{display:flex;gap:6px;padding:8px 10px;flex-shrink:0;background:#fff;border-bottom:1px solid #E0E0E0}
.pitem{flex:1;border-radius:8px;overflow:hidden;border:1.5px solid #E0E0E0;cursor:pointer}
.pitem img{width:100%;height:52px;object-fit:cover;display:block}
.pitem-lbl{font-size:8px;color:#757575;text-align:center;padding:2px;background:#F9F9F9}
.pkg-pick{display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:12px;cursor:pointer;margin-bottom:7px;transition:all .18s;border:1.5px solid #E8E8E8;background:#FAFAFA}

/* ── PKG MGR ── */
.mgr-card{background:#fff;border-radius:11px;padding:11px 12px;border:1.5px solid #E8E8E8;display:flex;align-items:center;gap:10px;margin-bottom:8px}
.finput{width:100%;border:1.5px solid #E0E0E0;border-radius:10px;padding:10px 12px;font-size:14px;font-weight:700;color:#212121;outline:none;font-family:inherit;margin-bottom:12px;transition:border-color .2s}
.finput:focus{border-color:#1565C0}

/* ── BUTTONS ── */
.btn{width:100%;padding:13px 0;border-radius:13px;border:none;font-weight:900;font-size:15px;cursor:pointer;font-family:inherit;transition:all .2s}
.btn:active:not(:disabled){transform:scale(.98)}
.btn:disabled{background:#E8E8E8!important;color:#9E9E9E!important;cursor:not-allowed}
.btn-blue{background:linear-gradient(135deg,#1565C0,#0D47A1);color:#fff;box-shadow:0 4px 14px rgba(21,101,192,.3)}
.btn-green{background:linear-gradient(135deg,#06C755,#05A847);color:#fff;box-shadow:0 4px 14px rgba(6,199,85,.3)}
.btn-red{background:linear-gradient(135deg,#EF5350,#C62828);color:#fff}
.btn-gray{background:#F5F5F5;color:#374151;box-shadow:none}
.btn-od{background:#fff;color:#1565C0;border:2px dashed #90CAF9}
.btn-sm{padding:6px 12px;border-radius:8px;font-size:11px;width:auto;font-family:inherit;font-weight:800;cursor:pointer;border:none;transition:all .12s}
.btn-sm:active{transform:scale(.96)}
.pad{padding:12px 12px 48px}

/* ── LIGHTBOX ── */
#lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:999;align-items:center;justify-content:center}
#lb.on{display:flex}
#lb img{max-width:95vw;max-height:90vh;border-radius:10px;object-fit:contain}
#lb-x{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:26px;cursor:pointer;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center}
</style>
</head>

function getQuotaDB(){ try{return JSON.parse(localStorage.getItem("pt_quota")||"{}");}catch(_){return {};} }
function saveQuotaDB(db){ try{localStorage.setItem("pt_quota",JSON.stringify(db));}catch(_){} }

// เรียกเมื่อ Admin กดเปิดเน็ต — บันทึกการใช้สิทธิ์
window.markActivated = function(orderNo, simPhone, refNo, quota) {
  const db = getQuotaDB();
  if (!db[orderNo]) db[orderNo] = { usedCount:0, maxQuota: quota||1, activations:[] };
  db[orderNo].maxQuota  = quota || db[orderNo].maxQuota || 1;
  db[orderNo].usedCount = (db[orderNo].usedCount||0) + 1;
  db[orderNo].activations = db[orderNo].activations || [];
  db[orderNo].activations.push({ sim:simPhone, ref:refNo, at:new Date().toISOString() });
  // ล้าง pending
  if(db[orderNo].pending) db[orderNo].pending = db[orderNo].pending.filter(p=>p.ref!==refNo);
  saveQuotaDB(db);
  console.log(`✅ บันทึกสิทธิ์: ${orderNo} (${db[orderNo].usedCount}/${db[orderNo].maxQuota})`);
};

// ดึงสรุปสิทธิ์ของออเดอร์
function getQuotaSummary(orderNo) {
  const db    = getQuotaDB();
  const entry = db[orderNo] || { usedCount:0, maxQuota:1, activations:[] };
  return {
    usedCount: entry.usedCount || 0,
    maxQuota:  entry.maxQuota  || 1,
    remaining: (entry.maxQuota||1) - (entry.usedCount||0),
    activations: entry.activations || [],
    pending: entry.pending || [],
  };
}

// Admin ปรับโควต้า (จำนวนซิมในออเดอร์)
function setQuota(orderNo, quota) {
  const db = getQuotaDB();
  if (!db[orderNo]) db[orderNo] = { usedCount:0, maxQuota:1, activations:[] };
  db[orderNo].maxQuota = quota;
  saveQuotaDB(db);
}

function loadAll(){

  try{pkgs=JSON.parse(localStorage.getItem("pt_packages")||"null")||DEFAULT_PKGS;}catch(_){pkgs=DEFAULT_PKGS;}
  try{reqs=JSON.parse(localStorage.getItem("pt_requests")||"null")||[];}catch(_){reqs=[];}
  renderChatList();

  $("rts").textContent="อัพเดท "+ts();
  // sync จาก API เงียบๆ ใน background
  syncFromAPI();
}

function syncFromAPI(){
  fetch(ORDERS_API)
    .then(function(r){ return r.json(); })
    .then(function(data){
      if(!data.orders || !data.orders.length) return;
      // merge: ข้อมูลจาก API + status/messages จาก localStorage
      var local = JSON.parse(localStorage.getItem("pt_requests")||"[]");
      var localMap = {};
      local.forEach(function(o){ localMap[o.ref]=o; });
      var merged = data.orders.map(function(o){
        var lo = localMap[o.ref];
        if(lo){
          o.status           = lo.status           || o.status;
          o.shopeeVerified   = lo.shopeeVerified   || o.shopeeVerified;
          o.lineMessages     = lo.lineMessages      || o.lineMessages;
          o.activatedPackage = lo.activatedPackage || o.activatedPackage;
          o.activatedAt      = lo.activatedAt      || o.activatedAt;
          o.aiResult         = lo.aiResult         || o.aiResult;
        }
        return o;
      });
      // เพิ่มรายการที่มีใน localStorage แต่ไม่มีใน API
      local.forEach(function(lo){
        if(!merged.find(function(o){return o.ref===lo.ref;})) merged.push(lo);
      });
      reqs = merged;
      localStorage.setItem("pt_requests", JSON.stringify(reqs));
      renderChatList();
      renderOrdList();
      updateBadges();
      $("rts").textContent="อัพเดท "+ts()+" (ซิงค์แล้ว)";
    })
    .catch(function(e){ console.warn("sync failed:", e.message); });
}

async function doVerify(){
  const req=getR();if(!req)return;verifying=true;renderOdActions(req);
  addMsgToReq(aref,"admin","กำลังตรวจสอบรูปภาพกับ AI ค่ะ รอสักครู่นะคะ 🤖");

  for(const[k,lb]of[["imgOrder","รูปคำสั่งซื้อ"],["imgSim","รูปซองซิม"],["imgReg","รูปลงทะเบียน"]]){
    if(req[k]){const b64=req[k].includes(",")?req[k].split(",")[1]:req[k];imgs.push({type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}});imgs.push({type:"text",text:`[${lb}]`});}
  }
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:600,messages:[{role:"user",content:[...imgs,{type:"text",text:`ข้อมูลลูกค้า: เลขพัสดุ: ${req.orderNo}, เบอร์: ${req.simPhone}, แพ็คเกจ: ${req.pkgName} (${req.pkgCode})\nตอบ JSON เท่านั้น ห้าม markdown:\n{"verdict":"pass/fail/unclear","detectedOrderNo":"","detectedPhone":"","price":"","isFreePackage":true/false,"issues":[],"summary":"1-2 ประโยค"}`}]}]})});
    const d=await res.json();req.aiResult=JSON.parse((d.content||[]).map(c=>c.text||"").join("").replace(/```json|```/g,"").trim());
  }catch(e){req.aiResult={verdict:"unclear",summary:"ไม่สามารถตรวจสอบอัตโนมัติได้ กรุณาตรวจสอบด้วยตนเอง",issues:[]};}
  verifying=false;saveReqs();renderOrdDetail(aref);
}

async function doActivate(pkgId){
  const req=getR();if(!req)return;const pkg=pkgs.find(p=>p.id===pkgId);if(!pkg)return;
  addMsgToReq(aref,"admin",`✅ ยืนยันคำสั่งซื้อเรียบร้อยแล้วนะคะ\n\nทางร้านดำเนินการเปิดแพ็คเกจ\n🌐 ${pkg.name}\n\n📵 กรุณาปิดเน็ตมือถือก่อนนะคะ แล้ว:\n📶 ${pkg.method}\n\nรอสักครู่เน็ตจะเข้าอัตโนมัติค่ะ 😊`);
  req.status="activated";req.activatedPackage=pkgId;req.activatedAt=ts();showNet=false;saveReqs();
  try{
    if(typeof window.markActivated==="function"){
      const q=typeof getQuotaSummary==="function"?getQuotaSummary(req.orderNo):{maxQuota:1};
      window.markActivated(req.orderNo,req.simPhone,req.ref,q.maxQuota);
    }
  }catch(_){}
  renderOrdDetail(aref);renderOrdList();updateBadges();
}

/* ══════ COPY ══════ */
function copyTxt(text,btnId){
  const done=()=>{const b=$(btnId);if(b){b.textContent="✅ คัดลอก";b.style.color="#166534";setTimeout(()=>{b.textContent="📋 คัดลอก";b.style.color="#E65100";},2000);}};
  if(navigator.clipboard)navigator.clipboard.writeText(text).then(done).catch(()=>fallbackCopy(text,done));
  else fallbackCopy(text,done);
}
function fallbackCopy(t,cb){const ta=document.createElement("textarea");ta.value=t;ta.style="position:fixed;opacity:0";document.body.appendChild(ta);ta.select();try{document.execCommand("copy");}catch(_){}document.body.removeChild(ta);cb();}

/* ══════ LIGHTBOX ══════ */
function openLb(src){$("lb-img").src=src;$("lb").classList.add("on");}
function closeLb(){$("lb").classList.remove("on");}

/* ══════ PKG MGR ══════ */
function showPkgMgr(){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("on"));
  $("sc-pkgs").classList.add("on");
  $("tabbar").style.display="none";
  setTopbar("จัดการแพ็คเกจ",()=>{$("sc-pkgs").classList.remove("on");switchTab(curTab);$("tabbar").style.display="flex";},"");
  $("pkg-mgr-list").innerHTML=pkgs.map(p=>`<div class="mgr-card"><div style="width:34px;height:34px;border-radius:9px;background:${p.color}18;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">${p.emoji||"📶"}</div><div style="flex:1;min-width:0"><div style="font-weight:800;font-size:12px;color:#111">${p.name}</div><div style="font-size:10px;font-family:monospace;color:#9E9E9E">${p.code} · ฿${p.price}</div></div><button class="btn-sm" style="background:#E3F2FD;color:#1565C0" onclick="openPkgForm('${p.id}')">✏️</button><button class="btn-sm" style="background:#FFEBEE;color:#C62828;margin-left:3px" onclick="delPkg('${p.id}')">🗑️</button></div>`).join("")||`<div style="text-align:center;padding:28px;color:#BDBDBD;font-size:13px">ยังไม่มีแพ็คเกจ</div>`;
}
function delPkg(id){if(!confirm("ลบแพ็คเกจนี้?"))return;pkgs=pkgs.filter(p=>p.id!==id);showPkgMgr();}
function openPkgForm(id){
  peid=id;pfe="📶";pfc="#00C853";const ex=id?pkgs.find(p=>p.id===id):null;
  if(ex){pfe=ex.emoji||"📶";pfc=ex.color||"#00C853";}
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("on"));$("sc-pkgform").classList.add("on");$("tabbar").style.display="none";
  setTopbar(id?"แก้ไขแพ็คเกจ":"เพิ่มใหม่",()=>{$("sc-pkgform").classList.remove("on");showPkgMgr();},"");
  $("pf-name").value=ex?.name||"";$("pf-code").value=ex?.code||"";$("pf-price").value=ex?.price||"";$("pf-method").value=ex?.method||"";
  $("ep").innerHTML=EMOJIS.map(e=>`<button onclick="sPfe('${e}')" style="width:34px;height:34px;border-radius:8px;border:none;font-size:17px;cursor:pointer;background:${pfe===e?"#E3F2FD":"#F5F5F5"};box-shadow:${pfe===e?"0 0 0 2px #1565C0":"none"}">${e}</button>`).join("");
  $("cp").innerHTML=COLORS.map(c=>`<button onclick="sPfc('${c}')" style="width:26px;height:26px;border-radius:50%;border:none;background:${c};cursor:pointer;box-shadow:${pfc===c?"0 0 0 3px #fff, 0 0 0 5px "+c:"none"}"></button>`).join("");
}
function sPfe(e){pfe=e;openPkgForm(peid);}
function sPfc(c){pfc=c;openPkgForm(peid);}
function savePkgForm(){
  const n=$("pf-name").value.trim(),co=$("pf-code").value.trim(),pr=$("pf-price").value.trim(),m=$("pf-method").value.trim();
  if(!n||!co||!pr){alert("กรุณากรอกข้อมูลให้ครบ");return;}
  const p={id:peid||("PKG"+Date.now()),name:n,code:co,price:Number(pr),emoji:pfe,color:pfc,method:m};
  pkgs=peid?pkgs.map(x=>x.id===peid?p:x):[...pkgs,p];
  $("sc-pkgform").classList.remove("on");showPkgMgr();
}
function saveAllPkgs(){try{localStorage.setItem("pt_packages",JSON.stringify(pkgs));}catch(_){}alert("บันทึกเรียบร้อยแล้วค่ะ ✅");$("sc-pkgs").classList.remove("on");switchTab(curTab);$("tabbar").style.display="flex";}

/* ══════ TOPBAR ══════ */
function setTopbar(title,backFn,right){
  const tlogo=document.getElementById("tlogo");
  const backBtn=document.getElementById("back-btn");
  const ttitle=document.getElementById("ttitle");
  const tright=document.getElementById("tright");
  if(tlogo)   tlogo.style.display   = backFn?"none":"flex";
  if(backBtn) backBtn.style.display = backFn?"block":"none";
  if(ttitle){ ttitle.style.display  = backFn?"block":"none"; ttitle.textContent=title||""; }
  if(backBtn) backBtn.onclick = backFn||null;
  if(tright)  tright.innerHTML = right!=null?right:`<button onclick="showPkgMgr()" style="padding:6px 12px;border-radius:20px;border:none;background:rgba(255,255,255,.2);color:#fff;font-weight:800;font-size:11px;cursor:pointer;font-family:inherit">📦 แพ็คเกจ</button>`;
}

/* ══════ SHOPEE TAB ══════ */

function copyAndToast(text){
  // คัดลอกข้อความ
  const done=()=>{
    const t=$("clipboard-toast");
    if(t){t.style.display="block";setTimeout(()=>t.style.display="none",3000);}
  };
  if(navigator.clipboard)navigator.clipboard.writeText(text).then(done).catch(()=>fallbackCopy(text,done));
  else fallbackCopy(text,done);
}

/* ══════ QUOTA RENDER HELPERS ══════ */
function getQuotaBadge(orderNo) {
  try {
    var q = getQuotaSummary(orderNo);
    if (q.maxQuota > 1 || q.usedCount > 0) {
      var col = q.remaining <= 0 ? "#C62828" : q.remaining === 1 ? "#E65100" : "#166534";
      var bg  = q.remaining <= 0 ? "#FFE4E6" : q.remaining === 1 ? "#FFF3E0" : "#DCFCE7";
      return '<span style="background:' + bg + ';color:' + col + ';font-size:10px;font-weight:800;padding:2px 8px;border-radius:8px;margin-left:4px">🎫 ' + q.usedCount + '/' + q.maxQuota + ' ซิม</span>';
    }
  } catch(_) {}
  return "";
}

function renderQuotaBox(orderNo, req) {
  try {
    var q    = getQuotaSummary(orderNo);
    var pct  = Math.min(100, Math.round((q.usedCount / q.maxQuota) * 100));
    var remBg = q.remaining <= 0 ? "rgba(198,40,40,.4)" : "rgba(255,255,255,.12)";
    var remLb = q.remaining <= 0 ? "ครบแล้ว" : "เหลือ";
    var alert = q.remaining <= 0 ? "<div style='margin-top:8px;background:rgba(198,40,40,.3);border-radius:8px;padding:6px 10px;font-size:11px;font-weight:700;text-align:center'>⛔ ออเดอร์นี้ใช้สิทธิ์ครบแล้ว</div>" : "";
    var opts = [1,2,3,4,5].map(function(n){
      return "<option value=" + n + (q.maxQuota===n?" selected":"") + ">" + n + " ซิม</option>";
    }).join("");
    var sel = "<select style='border:none;background:rgba(255,255,255,.25);color:#fff;font-weight:800;border-radius:6px;padding:2px 4px;font-size:12px;cursor:pointer' data-order='" + orderNo + "' data-ref='" + req.ref + "' onchange='setQuotaFromSel(this)'>" + opts + "</select>";
    return "<div style='background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.35);border-radius:12px;padding:12px 14px;margin-bottom:9px'>" +
      "<div style='display:flex;justify-content:space-between;align-items:center;margin-bottom:8px'>" +
        "<div style='font-weight:800;font-size:12px'>🎫 สิทธิ์รับเน็ตฟรี</div>" +
        "<div style='font-size:11px;opacity:.8'>ออเดอร์นี้มี " + sel + "</div>" +
      "</div>" +
      "<div style='background:rgba(255,255,255,.2);border-radius:99px;height:8px;margin-bottom:8px;overflow:hidden'>" +
        "<div style='width:" + pct + "%;height:100%;background:#fff;border-radius:99px;transition:width .4s'></div>" +
      "</div>" +
      "<div style='display:flex;gap:12px;font-size:12px'>" +
        "<div style='text-align:center;flex:1;background:rgba(255,255,255,.12);border-radius:8px;padding:6px 4px'><div style='font-weight:900;font-size:18px'>" + q.maxQuota + "</div><div style='opacity:.75;font-size:10px'>ทั้งหมด</div></div>" +
        "<div style='text-align:center;flex:1;background:rgba(255,255,255,.12);border-radius:8px;padding:6px 4px'><div style='font-weight:900;font-size:18px'>" + q.usedCount + "</div><div style='opacity:.75;font-size:10px'>ใช้แล้ว</div></div>" +
        "<div style='text-align:center;flex:1;background:" + remBg + ";border-radius:8px;padding:6px 4px'><div style='font-weight:900;font-size:18px'>" + q.remaining + "</div><div style='opacity:.9;font-size:10px'>" + remLb + "</div></div>" +
      "</div>" +
      alert +
    "</div>";
  } catch(e) { return ""; }
}

function setQuotaFromSel(sel) {
  var orderNo = sel.dataset.order;
  var ref     = sel.dataset.ref;
  setQuota(orderNo, Number(sel.value));
  renderOrdDetail(ref);
}
